<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ส่งงานสังคมศึกษา ม.6 - ความผิดเกี่ยวกับทรัพย์</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Tailwind Config & Custom Styles -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            800: '#0f2038',
                            900: '#0a192f',
                        },
                        gold: {
                            400: '#F3E5AB',
                            500: '#D4AF37',
                            600: '#AA7C11',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'pulse-gold': 'pulseGold 2s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseGold: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(212, 175, 55, 0.4)' },
                            '50%': { boxShadow: '0 0 0 10px rgba(212, 175, 55, 0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0a192f;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.08), transparent 30%);
            background-attachment: fixed;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(11, 30, 54, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .input-glass:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
            outline: none;
            background: rgba(0, 0, 0, 0.4);
        }

        .gold-text-gradient {
            background: linear-gradient(to right, #D4AF37, #F3E5AB, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a192f; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        
        /* Fix auto-zoom on iOS */
        input, select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Swal = window.Swal;

        // --- Icons (Inline SVG) ---
        const IconScale = ({className="w-6 h-6"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20"/><path d="M2 5h20"/><path d="m4 5 2 7a6 6 0 0 0 12 0l2-7"/></svg>
        );
        const IconTikTok = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        );
        const IconPlus = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        );
        const IconTrash = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        );
        const IconSearch = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        );
        const IconDashboard = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        );
        const IconFilter = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        );
        const IconBook = ({className="w-5 h-5"}) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        );
        const IconSpinner = ({className="w-5 h-5"}) => (
            <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        );

        // --- Main App Component ---
        const App = () => {
            const [view, setView] = useState('form'); // 'form' | 'dashboard'

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* Navbar */}
                    <nav className="glass sticky top-0 z-50 px-4 py-4 mb-6 md:mb-8">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-3 cursor-pointer group" onClick={() => setView('form')}>
                                <div className="p-2 bg-gradient-to-br from-gold-400 to-gold-600 rounded-lg text-navy-900 shadow-[0_0_15px_rgba(212,175,55,0.3)] group-hover:shadow-[0_0_25px_rgba(212,175,55,0.5)] transition-all flex-shrink-0">
                                    <IconScale className="w-5 h-5 md:w-6 md:h-6" />
                                </div>
                                <div className="min-w-0">
                                    <h1 className="font-bold text-base md:text-xl leading-tight gold-text-gradient truncate">สังคมศึกษา ม.6</h1>
                                    <p className="text-[10px] md:text-xs text-gray-300 truncate">โรงเรียนแม่จันวิทยาคม</p>
                                </div>
                            </div>
                            <button 
                                onClick={() => setView(view === 'form' ? 'dashboard' : 'form')}
                                className="flex items-center gap-2 px-3 md:px-4 py-2 rounded-full border border-gold-500/30 hover:border-gold-500 bg-navy-900/50 hover:bg-gold-500/10 transition-all text-xs md:text-sm font-medium text-gold-400 shadow-lg whitespace-nowrap"
                            >
                                {view === 'form' ? (
                                    <><IconDashboard className="w-4 h-4" /> <span className="hidden sm:inline">ผลการส่งงาน</span><span className="sm:hidden">ตรวจสอบ</span></>
                                ) : (
                                    <><IconPlus className="w-4 h-4" /> <span>ส่งงานใหม่</span></>
                                )}
                            </button>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow container mx-auto px-4 pb-12 relative animate-fade-in-up">
                        {view === 'form' ? (
                            <StudentForm setView={setView} />
                        ) : (
                            <SubmissionDashboard />
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="mt-auto py-6 border-t border-white/10 glass text-center text-xs md:text-sm text-gray-400 px-4">
                        <p>&copy; {new Date().getFullYear()} โรงเรียนแม่จันวิทยาคม | ระบบส่งงานวิชาสังคมศึกษา (ความผิดเกี่ยวกับทรัพย์)</p>
                    </footer>
                </div>
            );
        };

        // --- Student Form Component ---
        const StudentForm = ({ setView }) => {
            const [topic, setTopic] = useState('');
            const [url, setUrl] = useState('');
            const [members, setMembers] = useState([{ id: Date.now(), name: '', surname: '', room: 'ม.6/1', number: '' }]);
            const [loading, setLoading] = useState(false);

            const rooms = Array.from({length: 12}, (_, i) => `ม.6/${i+1}`);
            
            const SHEET_ID = '1pqu0R27ucozvPVqOI0vjdNp3qKY3b4n1q6urGftPADY';
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6HcohKcXefnMZOkn8pAxK0PeYTTMo1utS0kX3tou9bjCeIMhQT58DLY930vMKGjfojg/exec';

            const addMember = () => {
                setMembers([...members, { id: Date.now(), name: '', surname: '', room: members[0].room, number: '' }]); 
            };

            const removeMember = (id) => {
                if (members.length > 1) {
                    setMembers(members.filter(m => m.id !== id));
                }
            };

            const updateMember = (id, field, value) => {
                setMembers(members.map(m => m.id === id ? { ...m, [field]: value } : m));
            };

            const checkDuplicate = async (tiktokUrl) => {
                try {
                    const sheetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                    const response = await fetch(sheetUrl);
                    const text = await response.text();
                    const jsonStart = text.indexOf('({') + 1;
                    const jsonEnd = text.lastIndexOf('})') + 1;
                    const jsonString = text.substring(jsonStart, jsonEnd);
                    const data = JSON.parse(jsonString);
                    
                    let isDup = false;
                    if (data.table && data.table.rows) {
                        data.table.rows.forEach(row => {
                            const c = row.c;
                            if (c && c[2] && c[2].v) {
                                if (c[2].v.toString().trim() === tiktokUrl.trim()) isDup = true;
                            }
                        });
                    }
                    return isDup;
                } catch (error) {
                    console.error("เช็คลิงก์ซ้ำล้มเหลว (อนุญาตให้ส่งผ่านไปก่อน):", error);
                    return false;
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // 1. Validation
                if (!topic.trim()) {
                    Swal.fire({ icon: 'warning', title: 'กรุณากรอกหัวข้อ', background: '#0B1E36', color: '#fff' }); return;
                }
                if (!url) {
                    Swal.fire({ icon: 'error', title: 'กรุณากรอกลิงก์', background: '#0B1E36', color: '#fff' }); return;
                }
                if (!/tiktok\.com/i.test(url)) {
                    Swal.fire({ icon: 'warning', title: 'ลิงก์ไม่ถูกต้อง', text: 'กรุณาใช้ลิงก์ที่มาจากเว็บไซต์หรือแอป TikTok เท่านั้น', background: '#0B1E36', color: '#fff' }); return;
                }

                for (let m of members) {
                    if (!m.name || !m.surname || !m.number) {
                        Swal.fire({ icon: 'warning', title: 'ข้อมูลสมาชิกไม่ครบ', text: 'กรุณากรอก ชื่อ, นามสกุล และเลขที่ ของสมาชิกทุกคนให้ครบถ้วน', background: '#0B1E36', color: '#fff' }); return;
                    }
                }

                // 2. Confirm
                const result = await Swal.fire({
                    title: 'ยืนยันการส่งงาน?',
                    html: `<p class="text-sm text-gray-300">กรุณาตรวจสอบความถูกต้องของหัวข้อ ลิงก์ และรายชื่อสมาชิก</p>`,
                    icon: 'question',
                    showCancelButton: true,
                    background: '#0B1E36',
                    color: '#fff',
                    confirmButtonColor: '#D4AF37',
                    cancelButtonColor: '#ef4444',
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { popup: 'border border-gold-500/30 rounded-2xl' }
                });

                if (result.isConfirmed) {
                    setLoading(true);
                    
                    try {
                        // 3. Check Duplicate
                        const isDup = await checkDuplicate(url);
                        if (isDup) {
                            Swal.fire({ icon: 'error', title: 'พบลิงก์ซ้ำ!', text: 'ลิงก์ TikTok นี้ถูกส่งเข้าระบบไปแล้ว กรุณาตรวจสอบกับเพื่อนในกลุ่ม', background: '#0B1E36', color: '#fff' });
                            setLoading(false);
                            return;
                        }

                        // 4. บันทึกข้อมูลเข้า Web App URL (Google Apps Script)
                        const payload = {
                            topic: topic, // ส่ง Topic ไปด้วย
                            url: url,
                            members: members
                        };

                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        // 5. Success
                        await Swal.fire({
                            icon: 'success',
                            title: 'ส่งงานสำเร็จ!',
                            text: 'ระบบบันทึกข้อมูลเรียบร้อยแล้ว',
                            background: '#0B1E36',
                            color: '#fff',
                            confirmButtonColor: '#D4AF37',
                            customClass: { popup: 'border border-gold-500/30 rounded-2xl' }
                        });

                        // Reset & Navigate
                        setTopic('');
                        setUrl('');
                        setMembers([{ id: Date.now(), name: '', surname: '', room: 'ม.6/1', number: '' }]);
                        setView('dashboard'); 

                    } catch (error) {
                        console.error(error);
                        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่ หรือตรวจสอบสัญญาณเน็ต', background: '#0B1E36', color: '#fff' });
                    }
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-3xl mx-auto">
                    <div className="text-center mb-6 md:mb-8">
                        <h2 className="text-2xl md:text-4xl font-bold gold-text-gradient mb-3 drop-shadow-lg">ส่งคลิป TikTok</h2>
                        <p className="text-gray-300 bg-navy-800/50 inline-block px-3 py-1 md:px-4 md:py-1.5 rounded-full border border-white/10 text-xs md:text-sm">ความผิดเกี่ยวกับทรัพย์ (วิชาสังคมศึกษา ม.6)</p>
                    </div>

                    <form onSubmit={handleSubmit} className="glass p-5 md:p-8 rounded-2xl shadow-2xl space-y-6 md:space-y-8 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-gold-500/5 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2"></div>
                        
                        {/* Topic & URL Section */}
                        <div className="space-y-5">
                            <div>
                                <label className="block text-gold-400 text-sm font-semibold mb-2 flex items-center gap-2">
                                    <IconBook /> หัวข้อผลงานกลุ่ม
                                </label>
                                <input 
                                    type="text" 
                                    value={topic}
                                    onChange={(e) => setTopic(e.target.value)}
                                    placeholder="ระบุหัวข้อ (เช่น วิ่งราวทรัพย์, ชิงทรัพย์...)"
                                    className="w-full input-glass rounded-xl p-3.5 md:p-4 text-base focus:ring-2 ring-gold-500/50 shadow-inner"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-gold-400 text-sm font-semibold mb-2 flex items-center gap-2">
                                    <IconTikTok /> ลิงก์ผลงาน (TikTok URL)
                                </label>
                                <input 
                                    type="url" 
                                    value={url}
                                    onChange={(e) => setUrl(e.target.value)}
                                    placeholder="https://www.tiktok.com/@user/video/..."
                                    className="w-full input-glass rounded-xl p-3.5 md:p-4 text-base focus:ring-2 ring-gold-500/50 shadow-inner"
                                    required
                                />
                            </div>
                        </div>

                        <hr className="border-gold-500/20" />

                        {/* Members Section */}
                        <div>
                            <div className="flex justify-between items-end mb-4">
                                <label className="block text-gold-400 text-sm font-semibold flex items-center gap-2">
                                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                    รายชื่อสมาชิกในกลุ่ม
                                </label>
                                <span className="text-xs text-gray-400 bg-navy-900 px-2 py-1 rounded border border-white/10">รวม {members.length} คน</span>
                            </div>
                            
                            <div className="space-y-4">
                                {members.map((member, index) => (
                                    <div key={member.id} className="bg-navy-900/60 p-4 md:p-5 rounded-xl border border-gold-500/20 relative group hover:border-gold-500/40 transition-colors">
                                        <div className="absolute -top-3 -left-3 bg-gradient-to-br from-navy-800 to-navy-900 border border-gold-500 shadow-[0_0_10px_rgba(212,175,55,0.3)] text-gold-400 w-7 h-7 md:w-8 md:h-8 flex items-center justify-center rounded-full text-xs font-bold">
                                            {index + 1}
                                        </div>
                                        {members.length > 1 && (
                                            <button 
                                                type="button" 
                                                onClick={() => removeMember(member.id)}
                                                className="absolute top-2 right-2 text-gray-500 hover:text-red-400 transition-colors p-1 md:p-1.5 bg-navy-800/80 rounded-lg opacity-80 hover:opacity-100"
                                                title="ลบสมาชิก"
                                            >
                                                <IconTrash className="w-4 h-4 md:w-5 md:h-5" />
                                            </button>
                                        )}
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-12 gap-3 md:gap-4 mt-2 md:mt-3">
                                            <div className="col-span-2 md:col-span-4">
                                                <label className="text-xs text-gray-400 mb-1 block">ชื่อ</label>
                                                <input type="text" placeholder="ไม่ต้องใส่คำนำหน้า" value={member.name} onChange={(e) => updateMember(member.id, 'name', e.target.value)} className="w-full input-glass rounded-lg p-2.5 text-base md:text-sm" required />
                                            </div>
                                            <div className="col-span-2 md:col-span-4">
                                                <label className="text-xs text-gray-400 mb-1 block">นามสกุล</label>
                                                <input type="text" placeholder="นามสกุล" value={member.surname} onChange={(e) => updateMember(member.id, 'surname', e.target.value)} className="w-full input-glass rounded-lg p-2.5 text-base md:text-sm" required />
                                            </div>
                                            <div className="col-span-1 md:col-span-2">
                                                <label className="text-xs text-gray-400 mb-1 block">ชั้นเรียน</label>
                                                <select value={member.room} onChange={(e) => updateMember(member.id, 'room', e.target.value)} className="w-full input-glass rounded-lg p-2.5 text-base md:text-sm appearance-none cursor-pointer">
                                                    {rooms.map(r => <option key={r} value={r} className="bg-navy-900 text-white">{r}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-span-1 md:col-span-2">
                                                <label className="text-xs text-gray-400 mb-1 block">เลขที่</label>
                                                <input type="number" placeholder="เลขที่" value={member.number} onChange={(e) => updateMember(member.id, 'number', e.target.value)} className="w-full input-glass rounded-lg p-2.5 text-base md:text-sm" required min="1" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button 
                                type="button" 
                                onClick={addMember}
                                className="mt-4 flex items-center justify-center gap-2 text-sm text-gold-400 hover:text-gold-300 border border-gold-500/30 hover:border-gold-400 border-dashed rounded-xl px-4 py-3 w-full transition-all bg-gold-500/5 hover:bg-gold-500/10"
                            >
                                <IconPlus /> เพิ่มสมาชิกในกลุ่ม
                            </button>
                        </div>

                        {/* Submit Button */}
                        <button 
                            type="submit" 
                            disabled={loading}
                            className="w-full relative overflow-hidden group bg-gradient-to-r from-gold-600 via-gold-500 to-gold-600 hover:from-gold-500 hover:to-gold-400 text-navy-900 font-bold text-base md:text-lg py-3.5 md:py-4 rounded-xl shadow-[0_0_15px_rgba(212,175,55,0.4)] hover:shadow-[0_0_25px_rgba(212,175,55,0.6)] transition-all flex items-center justify-center gap-3 disabled:opacity-70 disabled:cursor-not-allowed mt-2 md:mt-4"
                        >
                            <div className="absolute inset-0 w-full h-full bg-white/20 scale-x-0 group-hover:scale-x-100 transform origin-left transition-transform duration-500 ease-out"></div>
                            <span className="relative z-10 flex items-center gap-2">
                                {loading ? (
                                    <><IconSpinner /> กำลังบันทึกข้อมูลเข้าระบบ...</>
                                ) : (
                                    <>คลิกส่งงาน</>
                                )}
                            </span>
                        </button>
                    </form>
                </div>
            );
        };

        // --- Public Dashboard Component ---
        const SubmissionDashboard = () => {
            const [submissions, setSubmissions] = useState([]);
            const [search, setSearch] = useState('');
            const [filterRoom, setFilterRoom] = useState('ทั้งหมด');
            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState('');
            
            // เพิ่ม State สำหรับกำหนดจำนวนนักเรียนต่อห้อง (ค่าตั้งต้น 40)
            const [maxStudents, setMaxStudents] = useState(40);

            const rooms = ['ทั้งหมด', ...Array.from({length: 12}, (_, i) => `ม.6/${i+1}`)];
            const SHEET_ID = '1pqu0R27ucozvPVqOI0vjdNp3qKY3b4n1q6urGftPADY';

            useEffect(() => {
                const fetchFromSheet = async () => {
                    setIsLoading(true);
                    setErrorMsg('');
                    try {
                        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Network response was not ok');
                        
                        const text = await response.text();
                        const jsonStart = text.indexOf('({') + 1;
                        const jsonEnd = text.lastIndexOf('})') + 1;
                        const jsonString = text.substring(jsonStart, jsonEnd);
                        const data = JSON.parse(jsonString);
                        
                        const parsedData = [];
                        
                        // อ่านข้อมูล คอลัมน์ที่คาดหวัง: 0:Date, 1:Time, 2:URL, 3:Room, 4:Number, 5:Name, 6:Surname, 7:Topic(เพิ่มใหม่)
                        if (data.table && data.table.rows) {
                            data.table.rows.forEach(row => {
                                const c = row.c;
                                if (!c || !c[2] || !c[2].v) return; 
                                
                                const formatCell = (cell) => cell ? (cell.f || cell.v || '') : '';
                                
                                const dateStr = formatCell(c[0]);
                                const timeStr = formatCell(c[1]);
                                const url = formatCell(c[2]);
                                const room = formatCell(c[3]);
                                const number = formatCell(c[4]);
                                const name = formatCell(c[5]);
                                const surname = formatCell(c[6]);
                                const topic = c[7] ? formatCell(c[7]) : '-'; // สมมติว่า Topic อยู่คอลัมน์ H (Index 7)

                                let existingSub = parsedData.find(s => s.url === url && s.dateStr === dateStr);
                                if (existingSub) {
                                    existingSub.members.push({ room, number, name, surname });
                                } else {
                                    parsedData.push({
                                        id: url + '_' + Math.random().toString(36).substr(2, 9),
                                        url: url,
                                        dateStr: dateStr,
                                        timeStr: timeStr,
                                        topic: topic,
                                        members: [{ room, number, name, surname }]
                                    });
                                }
                            });
                            
                            parsedData.reverse();
                            setSubmissions(parsedData);
                        }
                    } catch (err) {
                        console.error("Sheet Fetch Error:", err);
                        setErrorMsg('ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบว่าเปิดแชร์ Google Sheets หรือยัง');
                    } finally {
                        setIsLoading(false);
                    }
                };

                fetchFromSheet();
                const interval = setInterval(fetchFromSheet, 30000);
                return () => clearInterval(interval);
            }, []);

            const filteredData = useMemo(() => {
                return submissions.filter(sub => {
                    const matchRoom = filterRoom === 'ทั้งหมด' || sub.members.some(m => m.room === filterRoom);
                    const term = search.toLowerCase();
                    const matchSearch = sub.url.toLowerCase().includes(term) ||
                                        (sub.topic && sub.topic.toLowerCase().includes(term)) ||
                                        sub.members.some(m => 
                                            (m.name && m.name.toLowerCase().includes(term)) || 
                                            (m.surname && m.surname.toLowerCase().includes(term)) || 
                                            (m.number && m.number.toString().includes(term))
                                        );
                    return matchRoom && matchSearch;
                });
            }, [submissions, search, filterRoom]);

            // คำนวณเลขที่ที่ยังไม่ส่งงาน สำหรับห้องที่ถูกเลือก (วิเคราะห์จากข้อมูลดิบทั้งหมด ไม่ใช่แค่ที่ Search)
            const missingStudents = useMemo(() => {
                if (filterRoom === 'ทั้งหมด') return null;
                
                // ดึงเฉพาะข้อมูลนักเรียนในห้องที่เลือก
                const roomMembers = submissions.flatMap(sub => sub.members.filter(m => m.room === filterRoom));
                
                // เอาเลขที่มาซ้ำกันออก แล้วเรียงลำดับ
                const submittedNumbers = [...new Set(roomMembers.map(m => parseInt(m.number) || 0))].filter(n => n > 0);
                
                // สร้าง Array 1 ถึง maxStudents แล้วหาตัวที่หายไป
                const allNumbers = Array.from({length: maxStudents}, (_, i) => i + 1);
                const missing = allNumbers.filter(n => !submittedNumbers.includes(n));
                
                return {
                    submittedCount: submittedNumbers.length,
                    missing: missing
                };
            }, [submissions, filterRoom, maxStudents]);

            return (
                <div className="max-w-6xl mx-auto space-y-5 md:space-y-6">
                    <div className="text-center mb-6 md:mb-8">
                        <h2 className="text-2xl md:text-3xl font-bold gold-text-gradient mb-1 md:mb-2 drop-shadow-md">ผลการส่งงานทั้งหมด</h2>
                        <p className="text-gray-400 text-xs md:text-sm">ข้อมูลดึงอัตโนมัติจาก Google Sheets</p>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        <div className="glass p-4 md:p-5 rounded-2xl flex items-center justify-between border-l-4 border-l-gold-500 shadow-lg">
                            <div>
                                <p className="text-gray-400 text-[10px] md:text-xs uppercase tracking-wider font-semibold">จำนวนกลุ่มที่ส่งงาน</p>
                                <h3 className="text-2xl md:text-3xl font-bold text-white mt-1">{filteredData.length}</h3>
                            </div>
                            <div className="p-2.5 md:p-3 bg-gold-500/10 rounded-xl"><IconTikTok className="text-gold-500 w-6 h-6 md:w-7 md:h-7" /></div>
                        </div>
                        <div className="glass p-4 md:p-5 rounded-2xl flex items-center justify-between border-l-4 border-l-blue-400 shadow-lg">
                            <div>
                                <p className="text-gray-400 text-[10px] md:text-xs uppercase tracking-wider font-semibold">จำนวนนักเรียนที่ส่งแล้ว</p>
                                <h3 className="text-2xl md:text-3xl font-bold text-white mt-1">
                                    {filteredData.reduce((acc, curr) => acc + curr.members.length, 0)}
                                </h3>
                            </div>
                            <div className="p-2.5 md:p-3 bg-blue-400/10 rounded-xl">
                                <svg className="w-6 h-6 md:w-7 md:h-7 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                            </div>
                        </div>
                    </div>

                    {/* Table Section */}
                    <div className="glass rounded-2xl overflow-hidden flex flex-col shadow-2xl border border-white/5">
                        {/* Filters Bar */}
                        <div className="p-4 bg-navy-900/50 border-b border-white/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                            <div className="flex items-center gap-2 w-full sm:w-auto">
                                <IconFilter className="text-gold-500 w-5 h-5 flex-shrink-0" />
                                <select 
                                    value={filterRoom} 
                                    onChange={(e) => setFilterRoom(e.target.value)}
                                    className="w-full sm:w-48 input-glass rounded-lg px-3 py-2 text-sm md:text-base appearance-none font-semibold text-gold-400 cursor-pointer"
                                >
                                    {rooms.map(r => <option key={r} value={r} className="bg-navy-900 text-white">{r}</option>)}
                                </select>
                            </div>
                            
                            <div className="relative w-full sm:w-80">
                                <IconSearch className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-4 h-4" />
                                <input 
                                    type="text" 
                                    placeholder="ค้นหา ชื่อ, เลขที่, หัวข้อ..." 
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                    className="w-full input-glass rounded-full pl-9 pr-4 py-2 text-sm md:text-base focus:ring-1 ring-gold-500/50"
                                />
                            </div>
                        </div>

                        {/* Missing Students Panel (Shows only when a specific room is selected) */}
                        {filterRoom !== 'ทั้งหมด' && missingStudents && (
                            <div className="bg-navy-800/80 border-b border-gold-500/20 p-4">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div className="flex-1">
                                        <h4 className="text-gold-400 font-semibold text-sm mb-1 flex items-center gap-2">
                                            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                            สถานะการส่งงาน : {filterRoom}
                                        </h4>
                                        <div className="text-xs text-gray-300 mb-2">
                                            ส่งแล้ว <span className="text-green-400 font-bold">{missingStudents.submittedCount}</span> คน | 
                                            ยังไม่ส่ง <span className="text-red-400 font-bold">{missingStudents.missing.length}</span> คน
                                        </div>
                                        <div className="flex flex-wrap gap-1.5">
                                            {missingStudents.missing.length > 0 ? (
                                                missingStudents.missing.map(n => (
                                                    <span key={n} className="inline-block px-2 py-0.5 bg-red-500/20 text-red-300 border border-red-500/30 rounded text-[10px] md:text-xs">
                                                        เลขที่ {n}
                                                    </span>
                                                ))
                                            ) : (
                                                <span className="text-green-400 text-xs px-2 py-1 bg-green-500/10 border border-green-500/20 rounded">ส่งงานครบทุกคนแล้ว 🎉</span>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="shrink-0 bg-black/40 p-2.5 rounded-lg border border-white/5 flex items-center gap-2 self-start md:self-auto">
                                        <label className="text-[10px] md:text-xs text-gray-400">จำนวน นร. ทั้งหมด:</label>
                                        <input 
                                            type="number" 
                                            value={maxStudents} 
                                            onChange={(e) => setMaxStudents(parseInt(e.target.value) || 40)}
                                            className="w-16 bg-navy-900 border border-white/20 rounded px-2 py-1 text-xs text-white text-center focus:border-gold-500 focus:outline-none"
                                            min="1" max="60"
                                        />
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {/* Data Table */}
                        <div className="overflow-x-auto w-full">
                            {isLoading ? (
                                <div className="p-10 flex flex-col items-center justify-center text-gray-400">
                                    <IconSpinner className="w-8 h-8 text-gold-500 mb-3" />
                                    <span className="text-sm">กำลังโหลดข้อมูล...</span>
                                </div>
                            ) : (
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead>
                                        <tr className="bg-black/20 text-gold-400 text-xs md:text-sm uppercase tracking-wider">
                                            <th className="p-3 md:p-4 font-semibold whitespace-nowrap w-24 md:w-32">เวลาที่ส่ง</th>
                                            <th className="p-3 md:p-4 font-semibold w-1/3">ข้อมูลผลงาน</th>
                                            <th className="p-3 md:p-4 font-semibold">รายชื่อสมาชิก</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5 text-xs md:text-sm">
                                        {errorMsg ? (
                                            <tr>
                                                <td colSpan="3" className="p-8 text-center text-red-400 bg-red-900/20">
                                                    <div className="flex flex-col items-center justify-center">
                                                        <svg className="w-8 h-8 mb-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                                        {errorMsg}
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : filteredData.length > 0 ? filteredData.map((sub, idx) => (
                                            <tr key={sub.id} className={`hover:bg-white/5 transition-colors ${idx % 2 === 0 ? 'bg-transparent' : 'bg-black/10'}`}>
                                                <td className="p-3 md:p-4 text-gray-300 align-top">
                                                    <div className="flex flex-col">
                                                        <span className="font-medium text-white">{sub.dateStr || '-'}</span>
                                                        <span className="text-[10px] md:text-xs text-gray-500">{sub.timeStr || ''}</span>
                                                    </div>
                                                </td>
                                                <td className="p-3 md:p-4 align-top">
                                                    <div className="flex flex-col gap-2">
                                                        <div className="font-medium text-gold-400 bg-gold-500/10 px-2 py-1 rounded inline-block w-fit">
                                                            {sub.topic && sub.topic !== '-' ? sub.topic : 'ไม่มีชื่อหัวข้อ'}
                                                        </div>
                                                        <a href={sub.url} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1.5 text-blue-400 hover:text-blue-300 transition-colors break-all text-[11px] md:text-xs w-full max-w-[250px] md:max-w-xs">
                                                            <IconTikTok className="w-3.5 h-3.5 flex-shrink-0" /> {sub.url}
                                                        </a>
                                                    </div>
                                                </td>
                                                <td className="p-3 md:p-4 align-top">
                                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-1.5 md:gap-2">
                                                        {sub.members.map((m, i) => (
                                                            <div key={i} className="flex items-center gap-1.5 md:gap-2 bg-navy-800/50 p-1.5 md:p-2 rounded-lg border border-white/5">
                                                                <span className="bg-gold-500/20 text-gold-400 font-mono text-[9px] md:text-[10px] px-1 md:px-1.5 py-0.5 rounded border border-gold-500/30 whitespace-nowrap">{m.room}</span> 
                                                                <span className="text-gray-400 text-[10px] md:text-xs w-9 md:w-10">เลขที่ {m.number}</span> 
                                                                <span className="text-white truncate text-[11px] md:text-xs">{m.name} {m.surname}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr>
                                                <td colSpan="3" className="p-10 text-center text-gray-500">
                                                    <div className="flex flex-col items-center">
                                                        <svg className="w-10 h-10 text-gray-600 mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                                        {search || filterRoom !== 'ทั้งหมด' ? 'ไม่พบข้อมูลที่ตรงกับการค้นหา' : 'ยังไม่มีข้อมูลการส่งงาน'}
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
